<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <!-- Icon: color drop/palette face -->
  <g transform="translate(2, 2)">
    <!-- Face/drop shape -->
    <rect x="2" y="6" width="28" height="24" rx="12" fill="#FEED30"/>
    <!-- Eyes -->
    <circle cx="12" cy="18" r="2.5" fill="#111"/>
    <circle cx="22" cy="18" r="2.5" fill="#111"/>
    <!-- Mouth/tongue -->
    <path d="M10 24 Q16 30 22 24" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Tongue -->
    <ellipse cx="16" cy="27" rx="3.5" ry="3" fill="#FF6B6B"/>
    <!-- Color dots on top -->
    <circle cx="8" cy="5" r="4" fill="#FF6B6B"/>
    <circle cx="16" cy="2" r="4" fill="#4ECDC4"/>
    <circle cx="24" cy="5" r="4" fill="#667EEA"/>
  </g>
  <!-- Text -->
  <text x="42" y="28" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#111111" letter-spacing="-0.5">Color</text>
</svg>
