#:schema node_modules/wrangler/config-schema.json

name = "color"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker-entry.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }
workers_dev = false

[[d1_databases]]
binding = "DB"
database_name = "color-db"
database_id = "37e597a4-db6a-4f05-be5c-e4c0b34568ec"
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "03e54a04595c467e8a0e60b545e8fbcb"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "color-assets"

[ai]
binding = "AI"

[triggers]
crons = ["5 * * * *", "*/5 * * * *"]
