name: Publish Queue Cron

on:
  schedule:
    # Every hour at minute 5 (avoid exact top-of-hour congestion on GH runners)
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Hit publish endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl -fsSL \
              -H "Authorization: Bearer $CRON_SECRET" \
              https://color.color-681.workers.dev/api/cron/publish
          else
            curl -fsSL https://color.color-681.workers.dev/api/cron/publish
          fi
